<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Pro | Gestión Privada</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primario: #0369a1;
            --fondo: #f1f5f9;
            --libre: #ffffff;
            --ocupado: #cbd5e1;
            --texto: #1e293b;
            --exito: #22c55e;
            --alerta: #3b82f6;
            --error: #ef4444;
            --wa: #25d366;
            --oro: #f59e0b;
        }

        body { font-family: 'Inter', sans-serif; background: var(--fondo); margin: 0; padding: 20px; color: var(--texto); line-height: 1.4; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; }
        h1 { margin: 0; color: var(--primario); font-size: 26px; font-weight: 800; }
        .info-rifa p { margin: 4px 0; font-size: 14px; color: #475569; }
        .highlight { color: #b91c1c; font-weight: 800; font-size: 18px; margin: 10px 0; }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px 0; }
        .stat-card { background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; text-align: center; }
        .stat-card b { display: block; font-size: 20px; color: var(--exito); }
        .stat-card span { font-size: 10px; text-transform: uppercase; font-weight: 700; color: #64748b; }

        .grid-rifa { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; background: #e2e8f0; padding: 10px; border-radius: 15px; margin: 20px 0; }
        .n-box { aspect-ratio: 1; background: var(--libre); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid #94a3b8; transition: 0.2s; }
        .n-box.taken { background: var(--ocupado); color: #64748b; border: none; cursor: not-allowed; }
        .n-box.pago-completo { border: 2px solid var(--exito); background: #dcfce7; color: #166534; }

        #panelAdmin { display: none; margin-top: 30px; border-top: 5px double var(--primario); padding-top: 25px; }

        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #f1f5f9; }

        .btn-status { padding: 6px 10px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 10px; min-width: 85px; }
        .st-debe { background: var(--error); }
        .st-paga { background: var(--exito); }
        .st-abono { background: var(--alerta); }
        
        .btn-wa-icon { background: var(--wa); color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; }
        .btn-edit { background: #64748b; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-del { background: none; border: none; cursor: pointer; font-size: 16px; padding: 5px; }
        .btn-ganador { background: var(--oro); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; display: block; margin: 15px auto; box-shadow: 0 4px 10px rgba(245,158,11,0.3); }

        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
        .modal { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-ok { width: 100%; padding: 12px; background: var(--primario); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        @media (max-width: 500px) { .grid-rifa { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>

<div class="container">
 <header>
        <h1>RIFA SOLIDARIA</h1>
        <img src="https://i.ibb.co/vzN4F7Y/Rifa-Camiseta-Colombia.png" class="img-premio" alt="Camiseta Colombia Original">
        
        <div class="info-rifa">
            <p>🎁 <b>CAMISETA ORIGINAL SELECCIÓN COLOMBIA</b></p>
            <p>🗓️ 11 de Abril 2026 - Lotería de Boyacá</p>
            <p class="highlight">Valor Boleta: $25.000</p>
            <p>💳 Pago Bre-B / Nequi: 313 4078684</p>
        </div>
    </header>

    <div class="grid-rifa" id="tablero"></div>

    <div id="panelAdmin">
        <h3 style="text-align:center; color:#b91c1c; margin:0;">🔐 PANEL DE ADMINISTRACIÓN</h3>
        
        <button class="btn-ganador" onclick="verificarGanador()">🏆 VERIFICAR RESULTADO</button>

        <div class="stats-grid">
            <div class="stat-card">
                <span>Dinero en Caja</span>
                <b id="totalCaja">$0</b>
            </div>
            <div class="stat-card">
                <span>Falta por Cobrar</span>
                <b id="totalPendiente">$0</b>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>N°</th><th>Cliente</th><th>Abono</th><th>Estado</th><th>Acciones</th></tr>
                </thead>
                <tbody id="listaAdmin"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalCompra" class="overlay">
    <div class="modal">
        <h2 id="selNumTitle" style="color:var(--primario); margin:0 0 10px 0;">--</h2>
        <input type="text" id="inNombre" placeholder="Nombre completo">
        <input type="text" id="inTel" placeholder="WhatsApp (Ej: 313...)">
        <button class="btn-ok" onclick="guardarReserva()">Reservar Ahora</button>
        <button onclick="cerrarModal()" style="background:none; border:none; color:gray; cursor:pointer; margin-top:15px;">Volver</button>
    </div>
</div>

<script>
    const PRECIO = 25000;
    const MI_WHATSAPP = "3142447898"; 
    
    const firebaseConfig = {
        apiKey: "AIzaSyD1du2MrDhQgb_ujJX3phKVefyUNAwI1XA",
        authDomain: "autorifa-f0375.firebaseapp.com",
        databaseURL: "https://autorifa-f0375-default-rtdb.firebaseio.com",
        projectId: "autorifa-f0375",
        storageBucket: "autorifa-f0375.firebasestorage.app",
        messagingSenderId: "223773495183",
        appId: "1:223773495183:web:97fc57c91410fe808cc5fa"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let numActual = null;
    let localData = {};

    const isAdmin = new URLSearchParams(window.location.search).get('modo') === 'admin';
    if (isAdmin) document.getElementById('panelAdmin').style.display = 'block';

    const tablero = document.getElementById('tablero');
    for(let i=0; i<=99; i++){
        let n = i.toString().padStart(2, '0');
        let box = document.createElement('div');
        box.className = 'n-box'; box.id = 'box-' + n; box.innerText = n;
        box.onclick = () => { 
            if(!localData[n]) { 
                numActual=n; 
                document.getElementById('selNumTitle').innerText="Número: "+n; 
                document.getElementById('modalCompra').style.display='flex'; 
            } 
        };
        tablero.appendChild(box);
    }

    function cerrarModal() { document.getElementById('modalCompra').style.display = 'none'; }

    function guardarReserva() {
        const nombre = document.getElementById('inNombre').value.trim();
        const tel = document.getElementById('inTel').value.trim();
        if(!nombre || !tel) return alert("Llena todos los campos");
        
        db.ref('boletas/' + numActual).set({ nombre, tel, abono: 0 }).then(() => {
            cerrarModal();
            const msjAdmin = `¡Hola! Acabo de reservar el número *${numActual}* Mi nombre es ${nombre}, Tel: ${tel}`;
            const linkNotif = `https://wa.me/57${MI_WHATSAPP}?text=${encodeURIComponent(msjAdmin)}`;
            document.getElementById('inNombre').value = ""; document.getElementById('inTel').value = "";
            window.open(linkNotif, '_blank');
        });
    }

    db.ref('boletas').on('value', (snap) => {
        const data = snap.val() || {};
        localData = data;
        let recaudado = 0;
        document.querySelectorAll('.n-box').forEach(b => b.classList.remove('taken', 'pago-completo'));
        const tbody = document.getElementById('listaAdmin');
        tbody.innerHTML = "";

        Object.keys(data).sort().forEach(n => {
            const d = data[n];
            const abono = parseInt(d.abono) || 0;
            recaudado += abono;
            const el = document.getElementById('box-' + n);
            if(el) {
                el.classList.add('taken');
                if(abono >= PRECIO) el.classList.add('pago-completo');
            }
            if(isAdmin) {
                let btnClass = "st-debe", txt = "DEBE TODO";
                if(abono >= PRECIO) { btnClass = "st-paga"; txt = "PAGADO"; }
                else if(abono > 0) { btnClass = "st-abono"; txt = `$${abono.toLocaleString()}`; }
                tbody.innerHTML += `
                    <tr>
                        <td><b>${n}</b></td>
                        <td>${d.nombre}</td>
                        <td>$${abono.toLocaleString()}</td>
                        <td><button class="btn-status ${btnClass}" onclick="rotarEstado('${n}', ${abono})">${txt}</button></td>
                        <td style="white-space:nowrap">
                            <button class="btn-edit" onclick="editarNombre('${n}')">✏️</button>
                            <button class="btn-wa-icon" onclick="notificarWA('${n}')">💬</button>
                            <button class="btn-del" onclick="eliminar('${n}')">🗑️</button>
                        </td>
                    </tr>`;
            }
        });
        document.getElementById('totalCaja').innerText = `$${recaudado.toLocaleString()}`;
        document.getElementById('totalPendiente').innerText = `$${((Object.keys(data).length * PRECIO) - recaudado).toLocaleString()}`;
    });

    function editarNombre(n) {
        const d = localData[n];
        const nuevoNombre = prompt(`Editar nombre para el número ${n}:`, d.nombre);
        if (nuevoNombre !== null && nuevoNombre.trim() !== "") {
            db.ref('boletas/' + n).update({ nombre: nuevoNombre.trim() });
        }
    }

    function verificarGanador() {
        const numGanador = prompt("Ingrese las últimas 2 cifras del premio mayor:");
        if (numGanador !== null) {
            const n = numGanador.padStart(2, '0');
            const ganador = localData[n];
            if (ganador) {
                const pago = (parseInt(ganador.abono) >= PRECIO) ? "✅ PAGADA" : "⚠️ DEBE ($" + ganador.abono + ")";
                alert(`🎊 ¡GANADOR ENCONTRADO! 🎊\n\nNúmero: ${n}\nNombre: ${ganador.nombre}\nEstado: ${pago}\nTel: ${ganador.tel}`);
                const filas = document.querySelectorAll('#listaAdmin tr');
                filas.forEach(f => {
                    if(f.cells[0].innerText === n) { f.style.background = "#fef3c7"; f.scrollIntoView({behavior:'smooth'}); }
                });
            } else { alert(`El número ${n} no ha sido vendido.`); }
        }
    }

    function rotarEstado(n, actual) {
        if(actual === 0) db.ref('boletas/' + n).update({ abono: PRECIO });
        else if(actual >= PRECIO) {
            const v = prompt(`¿Cuánto abonó el número ${n}?`, "10000");
            if(v !== null) db.ref('boletas/' + n).update({ abono: parseInt(v) || 0 });
        } else db.ref('boletas/' + n).update({ abono: 0 });
    }

    function notificarWA(n) {
        const d = localData[n];
        const abono = parseInt(d.abono) || 0;
        const falta = PRECIO - abono;
        let msj = (abono >= PRECIO) ? `¡Hola ${d.nombre}! Tu número ${n} está PAGADO.🍀` : `¡Hola ${d.nombre}! Recordatorio número ${n}. Pendiente: *$${falta.toLocaleString()}*.`;
        window.open(`https://wa.me/57${d.tel.replace(/\D/g, '')}?text=${encodeURIComponent(msj)}`, '_blank');
    }

    function eliminar(n) { if(confirm(`¿Liberar el número ${n}?`)) db.ref('boletas/' + n).remove(); }
</script>
</body>
</html>
