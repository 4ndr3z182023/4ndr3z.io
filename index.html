<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Pro | Selección Colombia</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primario: #0369a1;
            --fondo: #f1f5f9;
            --tarjeta: #ffffff;
            --libre: #ffffff;
            --texto: #1e293b;
            --texto-secundario: #475569;
            --borde: #e2e8f0;
            --exito: #22c55e;
            --alerta: #3b82f6;
            --error: #ef4444;
            --wa: #25d366;
            --oro: #f59e0b;
            /* URL del balón (puedes cambiarla por una propia) */
            --img-balon: url('https://cdn-icons-png.flaticon.com/512/53/53283.png');
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --fondo: #0f172a;
                --tarjeta: #1e293b;
                --libre: #334155;
                --texto: #f1f5f9;
                --texto-secundario: #94a3b8;
                --borde: #334155;
                --primario: #38bdf8;
            }
        }

        body { font-family: 'Inter', sans-serif; background: var(--fondo); margin: 0; padding: 20px; color: var(--texto); transition: 0.3s; }
        .container { max-width: 950px; margin: 0 auto; background: var(--tarjeta); padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--borde); padding-bottom: 20px; }
        h1 { margin: 0; color: var(--primario); font-size: 26px; font-weight: 800; }
        .info-rifa p { margin: 4px 0; font-size: 14px; color: var(--texto-secundario); }
        .highlight { color: #ef4444; font-weight: 800; font-size: 18px; margin: 10px 0; }

        .grid-rifa { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 8px; 
            background: var(--borde); 
            padding: 15px; 
            border-radius: 20px; 
            margin: 20px 0; 
        }

        .n-box { 
            aspect-ratio: 1; 
            background: var(--libre); 
            color: var(--texto);
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 14px; 
            font-weight: 800; 
            cursor: pointer; 
            border: 1px solid var(--borde); 
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* ESTILO CUANDO EL NÚMERO ESTÁ OCUPADO (BALÓN) */
        .n-box.taken { 
            background-image: var(--img-balon);
            background-size: 80%;
            background-repeat: no-repeat;
            background-position: center;
            background-color: transparent;
            border: none;
            color: #000; /* Texto negro para que resalte en el balón blanco */
            cursor: not-allowed;
            filter: grayscale(0.3) opacity(0.8);
        }

        .n-box.pago-completo { 
            filter: none;
            opacity: 1;
            border: 2px solid var(--exito);
            background-color: #dcfce7;
        }

        /* PANEL ADMIN Y TABLAS */
        #panelAdmin { display: none; margin-top: 30px; border-top: 5px double var(--primario); padding-top: 25px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px 0; }
        .stat-card { background: var(--fondo); padding: 15px; border-radius: 15px; border: 1px solid var(--borde); text-align: center; }
        .stat-card b { display: block; font-size: 20px; color: var(--exito); }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--borde); }

        /* BOTONES Y MODAL */
        .btn-status { padding: 6px 10px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 10px; }
        .st-debe { background: var(--error); } .st-paga { background: var(--exito); } .st-abono { background: var(--alerta); }
        .btn-wa-icon { background: var(--wa); color: white; padding: 6px 10px; border-radius: 6px; text-decoration: none; font-size: 14px; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal { background: var(--tarjeta); padding: 25px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: var(--fondo); color: var(--texto); border: 1px solid var(--borde); border-radius: 10px; }
        .btn-ok { width: 100%; padding: 12px; background: var(--primario); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        @media (max-width: 500px) { .grid-rifa { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⚽ RIFA DE LA SELECCIÓN</h1>
           <img src="camiseta.png" class="img-premio" alt="Camiseta Colombia Original">
        <div class="info-rifa">
            <p>🎁 <b>CAMISETA ORIGINAL COLOMBIA 2026</b></p>
            <p>🗓️ 16 de Mayo - Lotería de Boyacá</p>
            <p class="highlight">Valor Boleta: $15.000</p>
            <p>💳 Nequi/Daviplata: 3213648676</p>
        </div>
    </header>

    <div class="grid-rifa" id="tablero"></div>

    <div id="panelAdmin">
        <h3 style="text-align:center; color:var(--error);">🔐 GESTIÓN DE VENTAS</h3>
        <div class="stats-grid">
            <div class="stat-card"><span>En Caja</span><b id="totalCaja">$0</b></div>
            <div class="stat-card"><span>Pendiente</span><b id="totalPendiente">$0</b></div>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>N°</th><th>Cliente</th><th>Abono</th><th>Estado</th><th>Acciones</th></tr></thead>
                <tbody id="listaAdmin"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalCompra" class="overlay">
    <div class="modal">
        <h2 id="selNumTitle" style="color:var(--primario);">--</h2>
        <input type="text" id="inNombre" placeholder="Nombre completo">
        <input type="text" id="inTel" placeholder="WhatsApp">
        <button class="btn-ok" onclick="guardarReserva()">¡GOL! Reservar</button>
        <button onclick="cerrarModal()" style="background:none; border:none; color:var(--texto-secundario); cursor:pointer; margin-top:15px;">Cerrar</button>
    </div>
</div>

<script>
    const PRECIO = 15000;
    const MI_WHATSAPP = "3142447898"; 
    
    // Configuración Firebase (la misma que ya tenías)
    const firebaseConfig = {
        apiKey: "AIzaSyD1du2MrDhQgb_ujJX3phKVefyUNAwI1XA",
        authDomain: "autorifa-f0375.firebaseapp.com",
        databaseURL: "https://autorifa-f0375-default-rtdb.firebaseio.com",
        projectId: "autorifa-f0375",
        storageBucket: "autorifa-f0375.firebasestorage.app",
        messagingSenderId: "223773495183",
        appId: "1:223773495183:web:97fc57c91410fe808cc5fa"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let numActual = null;
    let localData = {};

    const isAdmin = new URLSearchParams(window.location.search).get('modo') === 'admin';
    if (isAdmin) document.getElementById('panelAdmin').style.display = 'block';

    const tablero = document.getElementById('tablero');
    for(let i=0; i<=99; i++){
        let n = i.toString().padStart(2, '0');
        let box = document.createElement('div');
        box.className = 'n-box'; box.id = 'box-' + n; box.innerText = n;
        box.onclick = () => { 
            if(!localData[n]) { 
                numActual=n; 
                document.getElementById('selNumTitle').innerText="Número: "+n; 
                document.getElementById('modalCompra').style.display='flex'; 
            } 
        };
        tablero.appendChild(box);
    }

    function cerrarModal() { document.getElementById('modalCompra').style.display = 'none'; }

    function guardarReserva() {
        const nombre = document.getElementById('inNombre').value.trim();
        const tel = document.getElementById('inTel').value.trim();
        if(!nombre || !tel) return alert("Llena los datos");
        
        db.ref('boletas/' + numActual).set({ nombre, tel, abono: 0 }).then(() => {
            cerrarModal();
            const msj = `¡GOL!`¡Hola! Acabo de reservar el número *${numActual}* Mi nombre es ${nombre}, Tel: ${tel}`;
            window.open(`https://wa.me/57${MI_WHATSAPP}?text=${encodeURIComponent(msj)}`, '_blank');
        });
    }

    db.ref('boletas').on('value', (snap) => {
        const data = snap.val() || {};
        localData = data;
        let recaudado = 0;
        document.querySelectorAll('.n-box').forEach(b => b.classList.remove('taken', 'pago-completo'));
        const tbody = document.getElementById('listaAdmin');
        tbody.innerHTML = "";

        Object.keys(data).sort().forEach(n => {
            const d = data[n];
            const abono = parseInt(d.abono) || 0;
            recaudado += abono;
            const el = document.getElementById('box-' + n);
            if(el) {
                el.classList.add('taken');
                if(abono >= PRECIO) el.classList.add('pago-completo');
            }
            if(isAdmin) {
                let btnClass = abono >= PRECIO ? "st-paga" : (abono > 0 ? "st-abono" : "st-debe");
                tbody.innerHTML += `<tr>
                    <td><b>${n}</b></td><td>${d.nombre}</td><td>$${abono}</td>
                    <td><button class="btn-status ${btnClass}" onclick="rotarEstado('${n}', ${abono})">${abono >= PRECIO ? 'PAGO' : 'PEND'}</button></td>
                    <td><button onclick="eliminar('${n}')">🗑️</button></td>
                </tr>`;
            }
        });
        document.getElementById('totalCaja').innerText = `$${recaudado.toLocaleString()}`;
        document.getElementById('totalPendiente').innerText = `$${((Object.keys(data).length * PRECIO) - recaudado).toLocaleString()}`;
    });

    function rotarEstado(n, actual) {
        const nuevo = actual >= PRECIO ? 0 : PRECIO;
        db.ref('boletas/' + n).update({ abono: nuevo });
    }

    function eliminar(n) { if(confirm(`¿Liberar el ${n}?`)) db.ref('boletas/' + n).remove(); }
</script>
</body>
</html>
