<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Pro | Gestión Completa</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primario: #0369a1; --fondo: #f1f5f9; --tarjeta: #ffffff;
            --texto: #1e293b; --texto-secundario: #475569; --borde: #e2e8f0;
            --exito: #22c55e; --error: #ef4444; --oro: #f59e0b; --alerta: #3b82f6;
            --wa-color: #25d366;
        }

        body { font-family: 'Inter', sans-serif; background: var(--fondo); margin: 0; padding: 15px; color: var(--texto); }
        .container { max-width: 900px; margin: 0 auto; background: var(--tarjeta); padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        header { text-align: center; border-bottom: 2px solid var(--borde); padding-bottom: 20px; margin-bottom: 20px; }
        h1 { color: var(--primario); font-size: 24px; font-weight: 800; margin: 0; text-transform: uppercase; }

        .img-premio-box { width: 100%; max-width: 350px; margin: 15px auto; border-radius: 15px; overflow: hidden; display: none; border: 3px solid var(--borde); }
        .img-premio-box img { width: 100%; height: auto; display: block; }

        .info-rifa p { margin: 5px 0; font-size: 14px; }
        .highlight { color: var(--error); font-weight: 800; font-size: 22px; margin: 10px 0; }

        .grid-rifa { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; background: var(--borde); padding: 10px; border-radius: 15px; }
        .n-box { aspect-ratio: 1; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; cursor: pointer; border: 1px solid #ccc; transition: 0.2s; }
        .n-box:hover { transform: scale(1.05); z-index: 2; }
        
        .n-box.taken { background-color: #fee2e2; color: var(--error); border-color: var(--error); }
        .n-box.pago-completo { background-color: #dcfce7 !important; color: #166534 !important; border: 2px solid var(--exito) !important; }
        .n-box.con-abono { background-color: #e0f2fe; color: #0369a1; border: 2px solid var(--alerta); }

        /* BOTONES */
        .btn-admin { position: fixed; bottom: 15px; right: 15px; background: #000; color: #fff; border: none; padding: 10px 15px; border-radius: 20px; font-size: 12px; opacity: 0.6; cursor: pointer; z-index: 1000; }
        .btn-compartir { 
            position: fixed; bottom: 15px; left: 15px; 
            background: var(--wa-color); color: white; border: none; 
            padding: 12px 18px; border-radius: 50px; font-weight: bold; 
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4); 
            cursor: pointer; z-index: 1000; display: flex; align-items: center; gap: 8px;
            text-decoration: none; font-size: 14px;
        }

        #panelAdmin { display: none; margin-top: 30px; padding-top: 20px; border-top: 4px dashed var(--primario); }
        .config-box { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid var(--oro); margin-bottom: 20px; }
        .config-box input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        
        .btn-ok { width: 100%; padding: 12px; background: var(--primario); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Estilos Tabla Admin */
        table button { border: none; background: #e2e8f0; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        table button:hover { background: #cbd5e1; }
        .btn-status { padding: 5px 8px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; font-size: 10px; min-width: 60px; }
        .st-paga { background: var(--exito); } .st-debe { background: var(--error); } .st-abono { background: var(--alerta); }

        @media (max-width: 550px) { .grid-rifa { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>

<a id="btnCompartirWA" class="btn-compartir" href="#" target="_blank">
    <span>📲 Compartir Rifa</span>
</a>

<button class="btn-admin" onclick="accesoAdmin()">⚙️ CONFIG</button>

<div class="container">
    <header>
        <h1 id="disp-titulo">CARGANDO...</h1>
        <div id="wrapper-img" class="img-premio-box"><img id="disp-img" src="" alt="Premio"></div>
        <div class="info-rifa">
            <p>🎁 <b>PREMIO:</b> <span id="disp-premio">...</span></p>
            <p>🗓️ <b>SORTEO:</b> <span id="disp-fecha">...</span> - <b>LOTERÍA:</b> <span id="disp-loteria">...</span></p>
            <p class="highlight">VALOR: $<span id="disp-precio">0</span></p>
            <p>💳 <b>PAGOS:</b> <span id="disp-metodo">...</span></p>
        </div>
    </header>

    <div class="grid-rifa" id="tablero"></div>

    <div id="panelAdmin">
        <h2 style="text-align:center; color:var(--oro);">ADMINISTRACIÓN</h2>
        <button onclick="verificarGanador()" style="width:100%; padding:15px; background:var(--oro); border:none; color:white; font-weight:800; border-radius:12px; margin-bottom:20px; cursor:pointer;">🏆 VERIFICAR GANADOR</button>

        <div class="config-box">
            <input type="text" id="cfg-titulo" placeholder="Título">
            <input type="text" id="cfg-premio" placeholder="Premio">
            <input type="text" id="cfg-img-url" placeholder="URL Foto">
            <input type="number" id="cfg-precio" placeholder="Precio">
            <input type="text" id="cfg-fecha" placeholder="Fecha">
            <input type="text" id="cfg-loteria" placeholder="Lotería">
            <input type="text" id="cfg-metodo" placeholder="Pagos">
            <input type="text" id="cfg-wa" placeholder="Tu WhatsApp (Ej: 314...)">
            <button class="btn-ok" onclick="guardarConfig()" style="background:var(--exito);">💾 GUARDAR TODO</button>
        </div>

        <div style="overflow-x:auto;">
            <table style="width:100%; border-collapse:collapse; font-size:12px; background:white;">
                <thead style="background:var(--borde);">
                    <tr>
                        <th style="padding:10px;">N°</th>
                        <th>Cliente / Tel</th>
                        <th>Abono</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="listaAdmin"></tbody>
            </table>
        </div>
        <button onclick="location.reload()" style="margin-top:20px; width:100%; background:#64748b; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer;">SALIR</button>
    </div>
</div>

<div id="modalCompra" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; align-items:center; justify-content:center;">
    <div style="background:white; padding:25px; border-radius:20px; width:85%; max-width:320px; text-align:center;">
        <h2 id="selNumTitle" style="margin:0; color:var(--primario);">--</h2>
        <input type="text" id="inNombre" placeholder="Nombre completo" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ccc; border-radius:10px; box-sizing:border-box;">
        <input type="text" id="inTel" placeholder="WhatsApp" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ccc; border-radius:10px; box-sizing:border-box;">
        <button class="btn-ok" onclick="confirmarReserva()">RESERVAR</button>
        <button onclick="document.getElementById('modalCompra').style.display='none'" style="border:none; background:none; margin-top:10px; color:gray; cursor:pointer;">Cerrar</button>
    </div>
</div>

<script>
    const CLAVE = "1234"; 
    const URL_RIFA = "https://4ndr3z182023.github.io/4ndr3z.io/";

    const firebaseConfig = {
        apiKey: "AIzaSyD1du2MrDhQgb_ujJX3phKVefyUNAwI1XA",
        authDomain: "autorifa-f0375.firebaseapp.com",
        databaseURL: "https://autorifa-f0375-default-rtdb.firebaseio.com",
        projectId: "autorifa-f0375",
        storageBucket: "autorifa-f0375.firebasestorage.app",
        messagingSenderId: "223773495183",
        appId: "1:223773495183:web:97fc57c91410fe808cc5fa"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let localData = {};
    let configActual = {};
    let numTemp = "";

    function accesoAdmin() { if(prompt("Clave:") === CLAVE) document.getElementById('panelAdmin').style.display='block'; }

    db.ref('configuracion').on('value', snap => {
        const val = snap.val() || {};
        configActual = val;
        document.getElementById('disp-titulo').innerText = val.titulo || "RIFA";
        document.getElementById('disp-premio').innerText = val.premio || "---";
        document.getElementById('disp-precio').innerText = (parseInt(val.precio) || 0).toLocaleString();
        document.getElementById('disp-fecha').innerText = val.fecha || "---";
        document.getElementById('disp-loteria').innerText = val.loteria || "---";
        document.getElementById('disp-metodo').innerText = val.metodo || "---";
        
        if(val.imgUrl) { 
            document.getElementById('disp-img').src = val.imgUrl; 
            document.getElementById('wrapper-img').style.display = 'block'; 
        }

        const msjShare = `¡Hola! Participa en nuestra rifa: *${val.titulo || 'Gran Rifa'}*. El premio es: *${val.premio || 'Sorpresa'}*. Mira los números disponibles aquí: ${URL_RIFA}`;
        document.getElementById('btnCompartirWA').href = `https://wa.me/?text=${encodeURIComponent(msjShare)}`;

        document.getElementById('cfg-titulo').value = val.titulo || "";
        document.getElementById('cfg-premio').value = val.premio || "";
        document.getElementById('cfg-img-url').value = val.imgUrl || "";
        document.getElementById('cfg-precio').value = val.precio || "";
        document.getElementById('cfg-fecha').value = val.fecha || "";
        document.getElementById('cfg-loteria').value = val.loteria || "";
        document.getElementById('cfg-metodo').value = val.metodo || "";
        document.getElementById('cfg-wa').value = val.wa || "";
    });

    const tablero = document.getElementById('tablero');
    for(let i=0; i<=99; i++){
        let n = i.toString().padStart(2, '0');
        let div = document.createElement('div');
        div.className = 'n-box'; div.id = 'n-' + n; div.innerText = n;
        div.onclick = () => { if(!localData[n]) { numTemp=n; document.getElementById('selNumTitle').innerText="N° "+n; document.getElementById('modalCompra').style.display='flex'; } };
        tablero.appendChild(div);
    }

    function confirmarReserva() {
        const nombre = document.getElementById('inNombre').value.trim();
        const tel = document.getElementById('inTel').value.trim();
        if(!nombre) return alert("Nombre obligatorio");
        db.ref('boletas/' + numTemp).set({ nombre, tel: tel||'', abono: 0 }).then(() => {
            document.getElementById('modalCompra').style.display='none';
            document.getElementById('inNombre').value = "";
            document.getElementById('inTel').value = "";
            if(configActual.wa) window.open(`https://wa.me/57${configActual.wa}?text=¡Hola Aparté el ${numTemp} de tu Rifa Muchas Gracias!`, '_blank');
        });
    }

    db.ref('boletas').on('value', snap => {
        localData = snap.val() || {};
        const tbody = document.getElementById('listaAdmin');
        tbody.innerHTML = "";
        document.querySelectorAll('.n-box').forEach(b => b.classList.remove('taken', 'pago-completo', 'con-abono'));
        
        Object.keys(localData).sort().forEach(n => {
            const d = localData[n];
            const abono = parseInt(d.abono) || 0;
            const precio = parseInt(configActual.precio) || 0;
            const el = document.getElementById('n-' + n);
            
            if(el) {
                el.classList.add('taken');
                if(abono >= precio && precio > 0) el.classList.add('pago-completo');
                else if(abono > 0) el.classList.add('con-abono');
            }

            let st = `<button onclick="editarAbono('${n}')" class="btn-status st-debe">DEBE</button>`;
            if(abono >= precio && precio > 0) st = `<button onclick="editarAbono('${n}')" class="btn-status st-paga">PAGÓ</button>`;
            else if(abono > 0) st = `<button onclick="editarAbono('${n}')" class="btn-status st-abono">ABONÓ</button>`;
            
            tbody.innerHTML += `
                <tr>
                    <td style="padding:10px;"><b>${n}</b></td>
                    <td>
                        <div style="font-weight:600;">${d.nombre}</div>
                        <div style="font-size:10px; color:var(--primario);">${d.tel || 'Sin número'}</div>
                    </td>
                    <td>$${abono}</td>
                    <td>${st}</td>
                    <td>
                        <button onclick="editarCliente('${n}')" title="Editar Nombre/Tel">✏️</button>
                        <button onclick="borrar('${n}')" title="Eliminar">🗑️</button>
                    </td>
                </tr>`;
        });
    });

    // --- NUEVA FUNCIÓN: EDITAR CLIENTE ---
    function editarCliente(n) {
        const datos = localData[n];
        const nuevoNombre = prompt("Editar nombre del cliente:", datos.nombre);
        if (nuevoNombre === null) return;

        const nuevoTel = prompt("Editar WhatsApp:", datos.tel || "");
        if (nuevoTel === null) return;

        db.ref('boletas/' + n).update({
            nombre: nuevoNombre.trim() || "Sin nombre",
            tel: nuevoTel.trim()
        }).then(() => alert("Datos del número " + n + " actualizados"));
    }

    function editarAbono(n) {
        const m = prompt("Total abonado:", localData[n].abono);
        if(m !== null) db.ref('boletas/'+n).update({ abono: parseInt(m) || 0 });
    }

    function borrar(n) { if(confirm("¿Liberar el número " + n + "?")) db.ref('boletas/'+n).remove(); }

    function guardarConfig() {
        const n = {
            titulo: document.getElementById('cfg-titulo').value,
            premio: document.getElementById('cfg-premio').value,
            imgUrl: document.getElementById('cfg-img-url').value,
            precio: document.getElementById('cfg-precio').value,
            fecha: document.getElementById('cfg-fecha').value,
            loteria: document.getElementById('cfg-loteria').value,
            metodo: document.getElementById('cfg-metodo').value,
            wa: document.getElementById('cfg-wa').value
        };
        db.ref('configuracion').update(n).then(() => alert("Configuración Guardada"));
    }

    function verificarGanador() {
        const num = prompt("Introduce el número ganador (00-99):");
        if(num) {
            const formateado = num.padStart(2,'0');
            if(localData[formateado]) {
                alert("🎉 ¡GANADOR ENCONTRADO!\n\nNúmero: " + formateado + "\nNombre: " + localData[formateado].nombre + "\nTel: " + localData[formateado].tel);
            } else {
                alert("El número " + formateado + " no fue vendido.");
            }
        }
    }
</script>
</body>
</html>
